stages:
  - build
  - test
  - deploy

build_images:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker compose build
  only:
    - main
    - master

# Example Deployment Step
# You'll need to set up a GitLab Runner on your server
# or use SSH keys to push the code and run docker-compose.
deploy_to_server:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
  script:
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP "cd /home/$SERVER_USER/open-cv5 && git pull && docker compose up -d --build"
  only:
    - main
    - master
  when: manual # Set to manual for safety
