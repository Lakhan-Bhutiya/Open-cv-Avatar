  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    volumes:
      - ./web-app:/app
      - /app/node_modules
    restart: unless-stopped

  gateway:
    image: caddy:latest
    ports:
      - "5000:5000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    depends_on:
      - frontend
      # - backend
    restart: unless-stopped
