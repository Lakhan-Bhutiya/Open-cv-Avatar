services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5025:5025"
    volumes:
      - .:/app
      - /app/.venv # Don't sync internal venv
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5000:5000"
    volumes:
      - ./web-app:/app
      - /app/node_modules
    restart: unless-stopped
